<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1117;stop-opacity:1"/>
    </linearGradient>
    <!-- Accent gradient for hex ring -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#22d3a5"/>
    </linearGradient>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.6"/>
    </radialGradient>
    <!-- Filter for drop shadow / glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="36" fill="url(#bgGrad)"/>
  <!-- Subtle inner border -->
  <rect width="200" height="200" rx="36" fill="none" stroke="url(#hexGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- ══ BULLDOG BODY ══ -->

  <!-- Body -->
  <ellipse cx="100" cy="148" rx="46" ry="28" fill="#c0a882"/>
  <!-- Body shading -->
  <ellipse cx="100" cy="155" rx="38" ry="18" fill="#a8926a" opacity="0.4"/>

  <!-- Left arm / leg -->
  <ellipse cx="62" cy="162" rx="12" ry="10" fill="#b89a72"/>
  <ellipse cx="62" cy="170" rx="10" ry="6" fill="#a08060"/>
  <!-- Right arm / leg -->
  <ellipse cx="138" cy="162" rx="12" ry="10" fill="#b89a72"/>
  <ellipse cx="138" cy="170" rx="10" ry="6" fill="#a08060"/>

  <!-- Neck -->
  <ellipse cx="100" cy="130" rx="28" ry="16" fill="#c8aa86"/>

  <!-- ══ HEAD ══ -->

  <!-- Head base (wide bulldog skull) -->
  <ellipse cx="100" cy="104" rx="44" ry="38" fill="#d4b896"/>

  <!-- Forehead wrinkles -->
  <path d="M 80 80 Q 100 72 120 80" stroke="#b89a72" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 85 87 Q 100 80 115 87" stroke="#b89a72" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Ears (wide low bulldog ears) -->
  <!-- Left ear -->
  <path d="M 58 90 Q 48 78 52 64 Q 60 60 68 72 Q 70 82 62 92 Z" fill="#b89a72"/>
  <path d="M 60 88 Q 52 78 55 67 Q 61 64 66 74 Q 67 82 61 90 Z" fill="#c8a882" opacity="0.6"/>
  <!-- Right ear -->
  <path d="M 142 90 Q 152 78 148 64 Q 140 60 132 72 Q 130 82 138 92 Z" fill="#b89a72"/>
  <path d="M 140 88 Q 148 78 145 67 Q 139 64 134 74 Q 133 82 139 90 Z" fill="#c8a882" opacity="0.6"/>

  <!-- ══ FACE DETAILS ══ -->

  <!-- Snout (big boxy bulldog muzzle) -->
  <rect x="74" y="108" width="52" height="28" rx="14" fill="#c0a882"/>
  <rect x="76" y="110" width="48" height="24" rx="12" fill="#cab898"/>

  <!-- Nostrils -->
  <ellipse cx="91" cy="118" rx="7" ry="5" fill="#8a6a4a"/>
  <ellipse cx="109" cy="118" rx="7" ry="5" fill="#8a6a4a"/>
  <!-- Nostril highlights -->
  <ellipse cx="89" cy="116.5" rx="2.5" ry="2" fill="#a88060" opacity="0.7"/>
  <ellipse cx="107" cy="116.5" rx="2.5" ry="2" fill="#a88060" opacity="0.7"/>

  <!-- Mouth / underbite -->
  <path d="M 84 126 Q 88 132 100 134 Q 112 132 116 126" stroke="#8a6a4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Underbite teeth -->
  <rect x="90" y="127" width="8" height="6" rx="2" fill="#f0e8d8"/>
  <rect x="102" y="127" width="8" height="6" rx="2" fill="#f0e8d8"/>

  <!-- Jowl wrinkle lines -->
  <path d="M 72 112 Q 68 120 72 130" stroke="#b89a72" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 128 112 Q 132 120 128 130" stroke="#b89a72" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- ══ EYES ══ -->

  <!-- Eye whites + socket -->
  <circle cx="83" cy="97" r="13" fill="#8a6a4a" opacity="0.3"/>
  <circle cx="117" cy="97" r="13" fill="#8a6a4a" opacity="0.3"/>
  <circle cx="83" cy="97" r="11" fill="#f5f0e8"/>
  <circle cx="117" cy="97" r="11" fill="#f5f0e8"/>

  <!-- Iris (indigo/purple — AI vibe) -->
  <circle cx="83" cy="97" r="7.5" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <circle cx="117" cy="97" r="7.5" fill="url(#eyeGlow)" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="83" cy="97" r="4" fill="#1a1040"/>
  <circle cx="117" cy="97" r="4" fill="#1a1040"/>

  <!-- Eye shine -->
  <circle cx="86" cy="94" r="2" fill="white" opacity="0.9"/>
  <circle cx="120" cy="94" r="2" fill="white" opacity="0.9"/>
  <circle cx="85" cy="99" r="1" fill="white" opacity="0.4"/>
  <circle cx="119" cy="99" r="1" fill="white" opacity="0.4"/>

  <!-- Eyebrow furrow (bulldog scowl) -->
  <path d="M 73 86 Q 83 81 93 86" stroke="#8a6a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 107 86 Q 117 81 127 86" stroke="#8a6a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Brow crease between eyes -->
  <path d="M 92 82 Q 100 85 108 82" stroke="#b89a72" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ══ HEX ACCENT ══ -->
  <!-- Small glowing hex shape badge on chest -->
  <polygon points="100,170 108,175 108,185 100,190 92,185 92,175" fill="none" stroke="url(#hexGrad)" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <text x="100" y="184" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#818cf8">HEX</text>

  <!-- ══ CIRCUIT DETAIL (techy accent) ══ -->
  <!-- Left circuit line -->
  <path d="M 42 120 L 56 120 L 56 134 L 65 134" stroke="#6366f1" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="42" cy="120" r="2" fill="#6366f1" opacity="0.4"/>
  <!-- Right circuit line -->
  <path d="M 158 120 L 144 120 L 144 134 L 135 134" stroke="#6366f1" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="158" cy="120" r="2" fill="#6366f1" opacity="0.4"/>

  <!-- Top circuit accent -->
  <path d="M 100 58 L 100 66" stroke="#22d3a5" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <circle cx="100" cy="56" r="2.5" fill="#22d3a5" opacity="0.4"/>
</svg>
