<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DNS Lookup Tool — Query A, MX, TXT, CNAME, NS Records | HexHelp AI</title>
  <meta name="description" content="Free DNS lookup tool. Query A, AAAA, MX, TXT, CNAME, NS and SOA records for any domain. Powered by Cloudflare DNS-over-HTTPS. Instant results." />
  <meta name="keywords" content="DNS lookup, DNS checker, A record lookup, MX record lookup, TXT record, CNAME lookup, NS records, DNS propagation check, free DNS tool" />
  <meta name="author" content="HexHelp AI" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://hexhelpai.com/tools/dns.html" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hexhelpai.com/tools/dns.html" />
  <meta property="og:title" content="DNS Lookup Tool — Query A, MX, TXT, CNAME, NS Records | HexHelp AI" />
  <meta property="og:description" content="Free DNS lookup tool. Query A, AAAA, MX, TXT, CNAME, NS and SOA records for any domain. Powered by Cloudflare DNS-over-HTTPS. Instant results." />
  <meta property="og:image" content="https://hexhelpai.com/assets/og-image.png" />
  <meta property="og:site_name" content="HexHelp AI" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DNS Lookup Tool — Query A, MX, TXT, CNAME, NS Records | HexHelp AI" />
  <meta name="twitter:description" content="Free DNS lookup tool. Query A, AAAA, MX, TXT, CNAME, NS and SOA records for any domain. Powered by Cloudflare DNS-over-HTTPS. Instant results." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0b0f;--bg2:#0f1117;--surface:#1a1d27;--surface2:#1f2235;--border:rgba(255,255,255,0.08);--bh:rgba(99,102,241,0.4);--text:#e8eaf0;--muted:#7c7f96;--accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;--green:#22d3a5;--orange:#f97316}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(10,11,15,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-weight:700;font-size:1.1rem;color:var(--text)}
    .nav-logo img{width:36px;height:36px;border-radius:8px}
    .nav-logo .hex{color:var(--accent2)}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:0.875rem;font-weight:500;transition:color 0.2s}
    .nav-back:hover{color:var(--text)}
    main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:4rem 2rem 6rem}
    .page-header{text-align:center;margin-bottom:3rem}
    .page-icon{width:72px;height:72px;border-radius:18px;background:rgba(34,211,165,0.12);border:1px solid rgba(34,211,165,0.25);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1.5rem;box-shadow:0 0 40px rgba(34,211,165,0.15)}
    .page-title{font-size:2.2rem;font-weight:900;letter-spacing:-0.03em;margin-bottom:0.75rem}
    .page-title .gradient{background:linear-gradient(135deg,var(--accent2) 0%,var(--green) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .page-sub{color:var(--muted);font-size:1rem;line-height:1.7;max-width:500px;margin:0 auto}

    /* Search box */
    .search-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
    .search-row{display:flex;gap:0.75rem;flex-wrap:wrap}
    .input-domain{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:1rem;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color 0.2s}
    .input-domain:focus{border-color:var(--accent)}
    .input-domain::placeholder{color:var(--muted)}
    .type-tabs{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1rem}
    .type-tab{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:0.8rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
    .type-tab.active{background:rgba(99,102,241,0.2);border-color:var(--accent);color:var(--accent3)}
    .type-tab:hover:not(.active){border-color:var(--bh);color:var(--text)}
    .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:background 0.2s,transform 0.15s;font-family:'Inter',sans-serif;white-space:nowrap}
    .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
    .btn-primary:active{transform:scale(0.97)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}

    /* Results */
    .results-area{display:none}
    .results-area.visible{display:block}
    .result-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;overflow:hidden}
    .result-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)}
    .result-type{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent3)}
    .result-count{font-size:0.75rem;color:var(--muted);background:var(--bg2);padding:2px 10px;border-radius:100px}
    .record-table{width:100%;border-collapse:collapse}
    .record-table th{padding:0.6rem 1.5rem;text-align:left;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);border-bottom:1px solid var(--border)}
    .record-table td{padding:0.75rem 1.5rem;font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--text);border-bottom:1px solid rgba(255,255,255,0.04);word-break:break-all}
    .record-table tr:last-child td{border-bottom:none}
    .record-table tr:hover td{background:rgba(99,102,241,0.04)}
    .td-copy{cursor:pointer;color:var(--muted);font-size:0.72rem;font-family:'Inter',sans-serif;padding:3px 8px;border:1px solid var(--border);border-radius:5px;transition:all 0.2s;background:transparent;white-space:nowrap}
    .td-copy:hover{border-color:var(--accent);color:var(--accent2)}
    .td-copy.copied{border-color:var(--green);color:var(--green)}
    .no-records{padding:1.5rem;color:var(--muted);font-size:0.9rem;text-align:center}
    .error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:12px;padding:1.25rem;color:#fca5a5;font-size:0.9rem;margin-bottom:1rem}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#0a0f0a;padding:10px 24px;border-radius:100px;font-size:0.875rem;font-weight:700;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:1000}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface);border-radius:3px}
    @media(max-width:600px){.search-row{flex-direction:column}.btn-primary{width:100%}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="/assets/logo.svg" alt="HexHelp"/><span><span class="hex">Hex</span>Help AI</span></a>
  <a href="/" class="nav-back">← All Tools</a>
</nav>
<main>
  <div class="page-header">
    <div class="page-icon">🔍</div>
    <h1 class="page-title">DNS <span class="gradient">Lookup</span></h1>
    <p class="page-sub">Query DNS records for any domain — A, AAAA, MX, TXT, CNAME, NS and more.</p>
  </div>

  <div class="search-box">
    <div class="search-row">
      <input class="input-domain" id="domain-input" type="text" placeholder="e.g. github.com" autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button class="btn-primary" id="lookup-btn" onclick="doLookup()">Look Up</button>
    </div>
    <div class="type-tabs" id="type-tabs">
      <button class="type-tab active" data-type="A">A</button>
      <button class="type-tab active" data-type="AAAA">AAAA</button>
      <button class="type-tab active" data-type="MX">MX</button>
      <button class="type-tab active" data-type="TXT">TXT</button>
      <button class="type-tab active" data-type="CNAME">CNAME</button>
      <button class="type-tab active" data-type="NS">NS</button>
      <button class="type-tab active" data-type="SOA">SOA</button>
    </div>
  </div>

  <div id="error-area"></div>
  <div class="results-area" id="results-area"></div>
</main>
<div class="toast" id="toast">✓ Copied!</div>

<script>
  // Toggle tabs
  document.querySelectorAll('.type-tab').forEach(tab => {
    tab.addEventListener('click', () => tab.classList.toggle('active'));
  });

  document.getElementById('domain-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLookup();
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg || '✓ Copied!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓';
      btn.classList.add('copied');
      showToast('Copied!');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    });
  }

  function getSelectedTypes() {
    return [...document.querySelectorAll('.type-tab.active')].map(t => t.dataset.type);
  }

  async function queryDNS(domain, type) {
    const url = `https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(domain)}&type=${type}`;
    const r = await fetch(url, { headers: { Accept: 'application/dns-json' } });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  function ttlStr(s) {
    if (s >= 3600) return `${Math.round(s/3600)}h`;
    if (s >= 60) return `${Math.round(s/60)}m`;
    return `${s}s`;
  }

  function renderSection(type, answers) {
    const colorMap = { A:'var(--accent2)', AAAA:'var(--green)', MX:'var(--orange)', TXT:'var(--pink,#ec4899)', CNAME:'var(--accent3)', NS:'#facc15', SOA:'#06b6d4' };
    const color = colorMap[type] || 'var(--accent2)';

    let rows = '';
    if (!answers || answers.length === 0) {
      rows = `<div class="no-records">No ${type} records found</div>`;
    } else {
      let headers = '<tr><th>Value</th><th>TTL</th><th></th></tr>';
      if (type === 'MX') headers = '<tr><th>Priority</th><th>Mail Server</th><th>TTL</th><th></th></tr>';
      if (type === 'SOA') headers = '<tr><th>Primary NS</th><th>Admin</th><th>Serial</th><th>TTL</th></tr>';

      const trs = answers.map(a => {
        const val = a.data || '';
        if (type === 'MX') {
          const parts = val.split(' ');
          const prio = parts[0], server = parts[1] || val;
          return `<tr>
            <td>${prio}</td>
            <td>${server}</td>
            <td style="color:var(--muted)">${ttlStr(a.TTL||0)}</td>
            <td><button class="td-copy" onclick="copyText('${server.replace(/'/g,"\\'")}', this)">copy</button></td>
          </tr>`;
        }
        if (type === 'SOA') {
          const parts = val.split(' ');
          return `<tr>
            <td>${parts[0]||'—'}</td><td>${parts[1]||'—'}</td><td>${parts[2]||'—'}</td>
            <td style="color:var(--muted)">${ttlStr(a.TTL||0)}</td>
          </tr>`;
        }
        return `<tr>
          <td style="max-width:500px">${val}</td>
          <td style="color:var(--muted)">${ttlStr(a.TTL||0)}</td>
          <td><button class="td-copy" onclick="copyText('${val.replace(/'/g,"\\'")}', this)">copy</button></td>
        </tr>`;
      }).join('');

      rows = `<table class="record-table"><thead>${headers}</thead><tbody>${trs}</tbody></table>`;
    }

    return `<div class="result-section">
      <div class="result-header">
        <span class="result-type" style="color:${color}">${type} Records</span>
        <span class="result-count">${answers ? answers.length : 0}</span>
      </div>
      ${rows}
    </div>`;
  }

  async function doLookup() {
    const domain = document.getElementById('domain-input').value.trim().replace(/^https?:\/\//,'').split('/')[0];
    if (!domain) return;
    const types = getSelectedTypes();
    if (!types.length) { document.getElementById('error-area').innerHTML = '<div class="error-box">Select at least one record type.</div>'; return; }

    const btn = document.getElementById('lookup-btn');
    btn.innerHTML = '<span class="spinner"></span>Looking up…';
    btn.disabled = true;
    document.getElementById('error-area').innerHTML = '';
    document.getElementById('results-area').innerHTML = '';
    document.getElementById('results-area').classList.remove('visible');

    try {
      const results = await Promise.all(types.map(t => queryDNS(domain, t).then(d => ({ type: t, answers: d.Answer || [] })).catch(() => ({ type: t, answers: [] }))));
      const html = results.map(r => renderSection(r.type, r.answers)).join('');
      document.getElementById('results-area').innerHTML = html;
      document.getElementById('results-area').classList.add('visible');
    } catch(e) {
      document.getElementById('error-area').innerHTML = `<div class="error-box">❌ Lookup failed: ${e.message}</div>`;
    }

    btn.textContent = 'Look Up';
    btn.disabled = false;
  }
</script>
</body>
</html>
